<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГЛАВНОЕ МЕНЮ</title>
    <style>
     

		* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e3f2fd, #f0faff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: linear-gradient(145deg, #006699, #0077b6);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .top-bar::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to right, 
                rgba(0,119,182,0.4) 25%,
                rgba(72,202,228,0.4) 50%,
                rgba(0,119,182,0.4) 75%);
            filter: blur(10px);
        }

        .top-bar h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding-bottom: 0.5rem;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0 auto;
            width: 100%;
            max-width: 800px;
        }

        .button-container {
            display: grid;
            gap: 1.5rem;
            width: 100%;
            margin: 2rem 0;
        }

        .menu-button {
            background: rgba(255,255,255,0.95);
            color: #023e8a;
            text-decoration: none;
            padding: 1.5rem 2.5rem;
            border-radius: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid rgba(72,202,228,0.3);
            box-shadow: 0 6px 20px rgba(0,119,182,0.08);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .menu-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            transition: 0.5s;
        }

        .menu-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,119,182,0.15);
            background: rgba(255,255,255,1);
            color: #022a5c;
        }

        .menu-button:hover::before {
            left: 100%;
        }

        .description {
            text-align: center;
            margin-bottom: 3rem;
            padding: 0 1rem;
            max-width: 600px;
        }

        .description h2 {
            font-size: 2rem;
            color: #023e8a;
            margin-bottom: 1rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .description p {
            font-size: 1.1rem;
            color: #4a5568;
            line-height: 1.6;
            opacity: 0.9;
        }

        

         footer {
            background-color: #f0f0f0;
            padding: 25px;
            text-align: center;
            border-top: 2px solid #0077b6;
            color: #555;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .top-bar h1 {
                font-size: 2rem;
            }

            .content {
                padding: 1.5rem;
            }

            .menu-button {
                padding: 1.2rem 2rem;
                font-size: 1rem;
            }

            .description h2 {
                font-size: 1.8rem;
            }

            .description p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .menu-button {
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <h1>ГЛАВНОЕ МЕНЮ</h1>
    </header>

    <main class="content">
        <div class="description">
            <h2>Добро пожаловать!</h2>
            
        </div>

        <div class="button-container">
            <a href="page5.html" class="menu-button">📚 Операционные системы</a>
          
            <a href="page2.html" class="menu-button">🔧 Раздел 2</a>
            <a href="page3.html" class="menu-button">📊 Раздел 3</a>
            <a href="page4.html" class="menu-button">👩💻 Обо мне</a>
        </div>
    </main>

    <footer>
        <p>© 2025 Галиуллина Элина ИЦТМС 3-1</p>
    </footer>
</body>
</html>
